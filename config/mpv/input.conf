# Ultra-Minimal Input Config

# Playback
SPACE cycle pause
q quit
LEFT seek -5
RIGHT seek 5

# Volume
9 add volume -2
0 add volume 2
m cycle mute

# Subtitles
s cycle sub
v cycle sub-visibility

# Audio
a cycle audio

# Codec/Quality selector (with ytdlautoformat script)
c script-message cycle-codec
Ctrl+q script-message cycle-quality

# Info
i script-binding stats/display-stats
